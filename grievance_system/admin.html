<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SDGRS Admin</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    body {
      font-family: "Inter", sans-serif;
    }

    .admin-header {
      background: #0f172a;
      color: #e5e7eb;
      padding: 0.8rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .profile-logo {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      background: linear-gradient(135deg, #2563eb, #38bdf8);
      color: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: 600;
    }

    .profile-card {
      position: fixed;
      top: 70px;
      right: 20px;
      width: 260px;
      background: #020617;
      color: #e5e7eb;
      padding: 1rem;
      border-radius: 14px;
      box-shadow: 0 22px 60px rgba(15, 23, 42, 0.95);
      display: none;
      z-index: 999;
    }

    .profile-row {
      font-size: 0.85rem;
      margin-top: 0.25rem;
    }

    .admin-main {
      max-width: 900px;
      margin: 1.5rem auto;
      padding: 0 1.5rem;
    }

    .admin-card {
      background: #f9fafb;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
      margin-bottom: 1.5rem;
    }

    .admin-card h2 {
      margin-bottom: 0.8rem;
    }

    /* form styles */
    .admin-form label {
      display: block;
      margin-top: 0.7rem;
      font-weight: 500;
    }

    .admin-form input {
      width: 100%;
      padding: 0.6rem 0.7rem;
      margin-top: 0.25rem;
      border-radius: 8px;
      border: 1px solid #d1d5db;
    }

    .admin-form button {
      margin-top: 1rem;
      padding: 0.7rem 1.4rem;
      border-radius: 999px;
      border: none;
      background: #2563eb;
      color: #f9fafb;
      cursor: pointer;
      font-weight: 600;
    }

    .error-text {
      margin-top: 0.5rem;
      color: #dc2626;
      font-size: 0.85rem;
    }

    /* dashboard section hidden by default */
    #dashboardSection {
      display: none;
    }
  </style>
</head>
<body>
  <header class="admin-header">
    <div>
      <i class="fas fa-shield-halved"></i>
      <span>SDGRS Admin Console</span>
    </div>
    <div id="profileLogo" class="profile-logo" title="Admin profile">A</div>
  </header>

  <!-- profile popup -->
  <div id="profileCard" class="profile-card">
    <h3 id="adminName">Admin Name</h3>
    <div class="profile-row" id="adminEmail"></div>
    <div class="profile-row" id="adminDept"></div>
    <div class="profile-row" id="adminPhone"></div>
  </div>

  <main class="admin-main">
    <!-- REGISTER + DASHBOARD COMBINED -->

    <!-- 1) Register form -->
    <section id="registerSection" class="admin-card">
      <h2>Register admin</h2>
      <p>First time only: create your admin profile for SDGRS.</p>

      <form id="adminRegisterForm" class="admin-form">
        <label>Name</label>
        <input type="text" name="name" required />

        <label>Email</label>
        <input type="email" name="email" required />

        <label>Department</label>
        <input type="text" name="department" required />

        <label>Phone</label>
        <input type="text" name="phone" />

        <label>Password</label>
        <input type="password" name="password" required />

        <button type="submit">Register</button>
        <div id="registerError" class="error-text"></div>
      </form>
    </section>

    <!-- 2) Dashboard (hidden until admin exists) -->
    <section id="dashboardSection" class="admin-card">
      <h2>Welcome to SDGRS admin panel</h2>
      <p>Here you will manage grievances and escalations.</p>
      <p style="margin-top:0.8rem;font-size:0.9rem;">
        Use the contact/ticket section to see citizen grievances stored in MongoDB and add escalation
        logic later.
      </p>
    </section>
  </main>

  <script>
    const profileLogo = document.getElementById("profileLogo");
    const profileCard = document.getElementById("profileCard");
    const registerSection = document.getElementById("registerSection");
    const dashboardSection = document.getElementById("dashboardSection");
    const registerForm = document.getElementById("adminRegisterForm");
    const registerError = document.getElementById("registerError");

    let profileLoaded = false;

    async function loadProfile() {
      try {
        const res = await fetch("http://localhost:4000/api/admin/profile", {
          credentials: "include",
        });

        if (!res.ok) {
          // not logged in → keep register form visible
          return;
        }

        const data = await res.json();
        fillProfileUI(data);

        // show dashboard, hide register
        registerSection.style.display = "none";
        dashboardSection.style.display = "block";
        profileLoaded = true;
      } catch (e) {
        console.error("profile load error", e);
      }
    }

    function fillProfileUI(data) {
      document.getElementById("adminName").textContent = data.name;
      document.getElementById("adminEmail").textContent = "Email: " + data.email;
      document.getElementById("adminDept").textContent = "Department: " + data.department;
      document.getElementById("adminPhone").textContent = "Phone: " + (data.phone || "-");
      profileLogo.textContent = data.name ? data.name.charAt(0).toUpperCase() : "A";
    }

    // on first load, try to fetch profile (if already registered)
    loadProfile();

    // register form submit (AJAX)
    registerForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      registerError.textContent = "";

      const formData = new FormData(registerForm);
      const payload = Object.fromEntries(formData.entries());

      try {
        const res = await fetch("http://localhost:4000/api/admin/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify(payload),
        });

        const data = await res.json();

        if (!res.ok) {
          registerError.textContent = data.message || "Registration failed";
          return;
        }

        // success: fill UI, show dashboard
        fillProfileUI(data.admin);
        registerSection.style.display = "none";
        dashboardSection.style.display = "block";
        profileLoaded = true;
      } catch (err) {
        console.error("register error", err);
        registerError.textContent = "Server error";
      }
    });

    // profile toggle
    profileLogo.addEventListener("click", async () => {
      if (!profileLoaded) {
        await loadProfile();
      }

      if (profileCard.style.display === "block") {
        profileCard.style.display = "none";
      } else if (profileLoaded) {
        profileCard.style.display = "block";
      } else {
        alert("Register admin first.");
      }
    });

    // close profile when clicking outside
    document.addEventListener("click", (e) => {
      if (!profileCard.contains(e.target) && !profileLogo.contains(e.target)) {
        profileCard.style.display = "none";
      }
    });
  </script>
</body>
</html>
